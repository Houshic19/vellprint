<!DOCTYPE html>
<html lang="en" class="light-theme">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance - Vell Print Technology</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
  
  <link rel="stylesheet" href="/css/style.css?v=17">
</head>
  <style>
    /* Animated Background */
    .maintenance-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(125deg, var(--theme-bg) 0%, rgba(30, 40, 60, 0.5) 100%);
      z-index: -2;
      overflow: hidden;
    }
    
    /* Subtle glowing orb */
    .maintenance-bg::before {
      content: '';
      position: absolute;
      top: 30%;
      left: 50%;
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, var(--color-primary) 0%, transparent 60%);
      opacity: 0.15;
      transform: translate(-50%, -50%);
      filter: blur(80px);
      animation: floatOrb 8s infinite alternate ease-in-out;
    }

    @keyframes floatOrb {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.1; }
      100% { transform: translate(-45%, -55%) scale(1.1); opacity: 0.2; }
    }

    .maintenance-card {
      text-align: center;
      padding: 4rem 3rem;
      max-width: 650px;
      width: 90%;
      background: var(--theme-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: var(--border-radius-lg);
      box-shadow: 0 20px 40px var(--theme-shadow), inset 0 1px 0 rgba(255,255,255,0.1);
      border: 1px solid var(--theme-border);
      position: relative;
      overflow: hidden;
    }

    /* Top decorative line */
    .maintenance-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
    }

    .pulse-icon {
      font-size: 4.5rem;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
      display: inline-block;
      animation: gentlePulse 3s infinite ease-in-out;
    }

    @keyframes gentlePulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(0,0,0,0)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 10px 15px rgba(255,255,255,0.1)); }
    }
    
    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body style="display:flex; flex-direction:column; min-height:100vh; align-items:center; justify-content:center; background:var(--theme-bg);">

  <div class="maintenance-bg"></div>

  <div class="maintenance-card" style="animation: slideUpFade 0.8s ease-out forwards;">
    <i class="fa-solid fa-screwdriver-wrench pulse-icon"></i>
    <h1 class="gradient-text" style="font-size:2.75rem; margin-bottom:1.5rem; font-family:var(--font-heading); font-weight:800; letter-spacing:-0.5px;">System Upgrade</h1>
    <p style="color:var(--theme-text-muted); font-size:1.15rem; line-height:1.7; margin-bottom:2.5rem; max-width: 500px; margin-left: auto; margin-right: auto;">
      We are currently deploying powerful new features to enhance your dealer experience. The storefront will be back online securely in just a few moments.
    </p>
    
    <div style="display:flex; gap:1rem; justify-content:center; flex-wrap: wrap;">
      <a href="/" class="cta-btn cta-btn-outline" style="border:1px solid var(--theme-border); color:var(--theme-text); background:transparent;"><i class="fa-solid fa-house"></i> Return to Main Site</a>
      <a href="https://wa.me/919894833377" class="cta-btn" target="_blank" style="background:var(--color-primary); color:#fff; border:none; box-shadow:0 8px 20px rgba(0,0,0,0.15);"><i class="fa-brands fa-whatsapp"></i> Contact Support</a>
    </div>
  </div>

</body>
</html>
